name: Go test with Sonar
on:
  push: {}
  pull_request:
    types: [ opened, synchronize, reopened ]
permissions:
  contents: read
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      restricted-actor: ${{ steps.resolve.outputs.restricted-actor }}
      sonar-project-key: ${{ steps.config.outputs.sonar-project-key }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve restricted actor
        id: resolve
        uses: ./.github/actions/resolve-restricted-actor

      - name: Resolve sonar project key
        id: config
        run: |
          if [ "${{ steps.resolve.outputs.restricted-actor }}" = "true" ]; then
            echo "sonar-project-key=" >> "$GITHUB_OUTPUT"
          else
            echo "sonar-project-key=${{ vars.SONAR_PROJECT_KEY }}" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: prepare
    name: Build and test with coverage
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-go-build.yaml@8668020927f2a84d8d096a359c719c3c3a403520 # v2.5.0
    with:
      sonar-project-key: ${{ needs.prepare.outputs.sonar-project-key }}
      go-module-dir: '.'
      install-envtest: true
      kube-version: '1.32.0'
      envtest-version: 'release-0.23'
      skip-docker: true
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      packages: write
