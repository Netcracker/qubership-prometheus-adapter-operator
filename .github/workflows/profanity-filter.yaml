---
name: Profanity filter

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  prepare-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      restricted-actor: ${{ steps.resolve.outputs.restricted-actor }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Resolve restricted actor
      id: resolve
      uses: ./.github/actions/resolve-restricted-actor

  apply-filter:
    needs: prepare-config
    if: ${{ needs.prepare-config.outputs.restricted-actor != 'true' && github.actor != 'github-actions[bot]' }}
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Scan issue or pull request for profanity
      uses: IEvangelist/profanity-filter@10.0
      id: profanity-filter
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # See https://bit.ly/potty-mouth-replacement-strategies
        replacement-strategy: middle-asterisk # See Replacement strategy
        custom-profane-words-url: https://github.com/Hesham-Elbadawi/list-of-banned-words/raw/refs/heads/master/ru
