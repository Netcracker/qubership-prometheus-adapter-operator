version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    actions-deps:
      patterns:
        - "*"
- package-ecosystem: "gomod"
  directories:
  - "/"
  - "/api"
  schedule:
    interval: "monthly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    k8s.io:
      patterns:
      - "k8s.io/*"
    go.opentelemetry.io:
      patterns:
      - "go.opentelemetry.io/*"
  open-pull-requests-limit: 20
- package-ecosystem: "docker"
  directories:
  - "/"
  - "/prometheus-adapter"
  schedule:
    interval: "monthly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    actions-deps:
      patterns:
        - "*"
